name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: hyoka/go.mod
      - name: Download dependencies
        run: cd hyoka && go mod download
      - name: Verify dependencies
        run: cd hyoka && go mod verify
      - name: Build
        run: cd hyoka && go build ./...
      - name: Vet
        run: cd hyoka && go vet ./...
      - name: Test
        run: cd hyoka && go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: hyoka/coverage.txt
        if: always()

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: hyoka/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: hyoka
