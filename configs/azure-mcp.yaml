# Azure MCP: Azure MCP server attached — tests tool-augmented ability
configs:
  - name: azure-mcp
    description: "Azure MCP server attached"
    models:
      - "claude-sonnet-4.5"
      - "claude-opus-4.6"
      - "gpt-5.3-codex"
    reviewer_models:
      - "claude-opus-4.6"
      - "gemini-3-pro-preview"
      - "gpt-4.1"
    mcp_servers:
      azure:
        type: local
        command: npx
        args: ["-y", "@azure/mcp@latest"]
        tools: ["*"]
    reviewer_skill_directories:
      - "./skills/reviewer"
