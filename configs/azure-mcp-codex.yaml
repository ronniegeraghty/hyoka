# Azure MCP with GPT 5.3 Codex — Azure MCP server attached
configs:
  - name: azure-mcp/gpt-5.3-codex
    description: "Azure MCP — GPT 5.3 Codex"
    generator:
      model: "gpt-5.3-codex"
      mcp_servers:
        azure:
          type: local
          command: npx
          args: ["-y", "@azure/mcp@latest", "server", "start"]
          tools: ["*"]
    reviewer:
      models:
        - "claude-opus-4.6"
        - "gemini-3-pro-preview"
        - "gpt-4.1"
      skills:
        - type: local
          path: "./skills/reviewer"
