# Baseline with Claude Opus 4.6 + remote skills — no MCP servers
# Demonstrates auto-fetching skills from a remote registry at eval time.
# Skills give the generator domain-specific knowledge (e.g., SDK patterns,
# API usage examples) that improve code generation quality.
#
# remote_skills entries are fetched automatically via `npx skills add`
# into a temp directory before the eval runs — no manual install step needed.
configs:
  - name: baseline-skills/claude-opus-4.6
    description: "Baseline + Skills — Claude Opus 4.6 with remote skills"
    model: "claude-opus-4.6"
    reviewer_models:
      - "claude-opus-4.6"
      - "gemini-3-pro-preview"
      - "gpt-4.1"
    remote_skills:
      - repo: microsoft/skills
        skills:
          - keyvault-secrets-java
