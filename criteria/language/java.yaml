match:
  language: java
criteria:
  - name: Correct Dependencies (com.azure, not com.microsoft.azure)
    description: >
      Uses com.azure group ID for all Azure SDK packages. No com.microsoft.azure
      (legacy SDK) dependencies. Includes azure-identity for authentication.
  - name: Correct Imports (no legacy, no internal packages)
    description: >
      All imports use com.azure.* packages. No com.microsoft.azure.* (legacy)
      or com.azure.*.implementation.* (internal API) imports.
  - name: DefaultAzureCredential Authentication
    description: >
      Uses DefaultAzureCredential or another com.azure.identity credential.
      No hardcoded connection strings, account keys, SAS tokens, or secrets.
  - name: Client Builder Pattern
    description: >
      SDK clients constructed using *ClientBuilder classes with .endpoint()
      or .vaultUrl() and .credential(). No legacy constructors
      (CloudStorageAccount, DocumentClient, KeyVaultClient).
  - name: No Deprecated/Legacy Classes
    description: >
      No deprecated classes from the old SDK (CloudStorageAccount,
      CloudBlobClient, DocumentClient, QueueClient, ApplicationTokenCredentials,
      MSICredentials, ConnectionStringBuilder).
  - name: Pagination (PagedIterable/PagedFlux)
    description: >
      List/query operations return PagedIterable (sync) or PagedFlux (async).
      Does not flatten all pages into a raw List or Stream in memory.
  - name: LRO Pattern (SyncPoller/PollerFlux)
    description: >
      Long-running operations use SyncPoller (sync) or PollerFlux (async)
      with begin* method prefix. No Thread.sleep() polling loops.
  - name: Async Uses Project Reactor (Mono/Flux)
    description: >
      Async code uses Project Reactor types (Mono, Flux). Not CompletableFuture
      (wrong), not RxJava (wrong), not sync wrapped in ExecutorService.
      No .block() inside async service implementations.
  - name: Service-Specific Exception Handling
    description: >
      Catches service-specific exceptions (BlobStorageException, CosmosException,
      ServiceBusException, HttpResponseException) with status code inspection.
      Not just generic Exception catches.
  - name: Code Compiles (mvn compile / gradle compileJava)
    description: >
      The generated code compiles without errors. Attempt build verification
      if build tools are available.
